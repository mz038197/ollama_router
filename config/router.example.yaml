public_url: "http://127.0.0.1:8000"
student_default_ttl_hours: 2

auth:
  teacher_domain: "school.edu"
  admin_emails:
    - "admin@school.edu"
  google_client_id: ""
  google_client_secret: ""
  session_secret: "change-me"
  open_registration: true

# Google OAuth 設定說明：
# 1. 到 Google Cloud Console 建立 OAuth 2.0 Client（Web application）
# 2. Authorized redirect URI 必須與 public_url 一致：
#    {public_url}/auth/google/callback
# 3. 填入 google_client_id / google_client_secret 後，Portal 會改用正式 Google 登入

database:
  path: "~/.ollama_router/router.db"
  archive_dir: "~/.ollama_router/archive"

prompt_logs:
  retention_days: 30
