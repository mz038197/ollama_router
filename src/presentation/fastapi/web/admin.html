<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬公高中AIServer控管中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .panel-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .panel-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .teachers-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .teacher-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .teacher-item:hover {
            background: #e9ecef;
            transform: translateX(4px);
        }

        .teacher-item.active {
            background: #667eea;
            color: white;
        }

        .teacher-item-name {
            font-weight: 500;
        }

        .teacher-item-count {
            font-size: 12px;
            opacity: 0.7;
        }

        .teacher-actions {
            display: flex;
            gap: 5px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-sm-danger {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .btn-sm-danger:hover {
            background: #dc3545;
            color: white;
        }

        .btn-sm-primary {
            background: rgba(102, 126, 234, 0.15);
            color: #3f51b5;
        }

        .btn-sm-primary:hover {
            background: #667eea;
            color: white;
        }

        .keys-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .keys-table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .keys-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .keys-table td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }

        .keys-table tbody tr:hover {
            background: #f8f9fa;
        }

        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
            max-width: 200px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-enabled {
            background: #d4edda;
            color: #155724;
        }

        .status-disabled {
            background: #f8d7da;
            color: #721c24;
        }

        .key-actions {
            display: flex;
            gap: 5px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease-in;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .switch {
            display: inline-block;
            position: relative;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #28a745;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .logs-panel {
            margin-top: 30px;
        }

        .logs-filter-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        @media (max-width: 1000px) {
            .logs-filter-grid {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
        }

        .logs-table-wrap {
            overflow-x: auto;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        .logs-table th,
        .logs-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
            text-align: left;
            vertical-align: top;
        }

        .logs-table thead {
            background: #f8f9fa;
        }

        .logs-message-preview {
            max-width: 340px;
            word-break: break-word;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>馬公高中 AI Server 控管中心</h1>
            <p>管理教師和班級的 API 金鑰配置</p>
        </div>

        <div id="messageContainer"></div>

        <div class="main-grid">
            <!-- 左側面板 -->
            <div class="panel">
                <div class="panel-header">教師列表</div>
                <div class="panel-body">
                    <div class="form-group">
                        <label>新增教師名稱</label>
                        <div class="button-group">
                            <input type="text" id="newTeacherName" placeholder="輸入教師名稱" />
                            <button class="btn btn-primary" onclick="addTeacher()" style="flex: 0 0 auto; width: auto;">新增</button>
                        </div>
                    </div>

                    <div class="teachers-list" id="teachersList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p>還沒有教師</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側面板 -->
            <div class="panel">
                <div class="panel-header" id="selectedTeacherHeader">選擇教師以編輯</div>
                <div class="panel-body" id="keysPanel">
                    <div class="empty-state">
                        <div class="empty-state-icon">👈</div>
                        <p>請從左側選擇教師</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel logs-panel">
            <div class="panel-header">請求記錄（Logs）</div>
            <div class="panel-body">
                <div class="logs-filter-grid">
                    <input type="date" id="logDate" />
                    <select id="logTeacher">
                        <option value="">全部教師</option>
                    </select>
                    <input type="text" id="logModel" placeholder="模型（可選）" />
                    <select id="logIsValid">
                        <option value="">全部結果</option>
                        <option value="true">通過</option>
                        <option value="false">拒絕</option>
                    </select>
                    <input type="text" id="logKeyword" placeholder="訊息關鍵字" />
                    <input type="number" id="logLimit" value="50" min="1" max="200" />
                </div>

                <div class="button-group" style="margin-top: 0;">
                    <button class="btn btn-primary" onclick="applyLogFilters()">查詢</button>
                    <button class="btn btn-secondary" onclick="refreshLogs()">重新整理</button>
                    <button class="btn btn-secondary" id="loadMoreLogsBtn" onclick="loadMoreLogs()" style="display:none;">載入更多</button>
                </div>

                <div class="logs-table-wrap" style="margin-top: 16px;">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>時間</th>
                                <th>教師</th>
                                <th>模型</th>
                                <th>驗證</th>
                                <th>API Key</th>
                                <th>訊息預覽</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <tr>
                                <td colspan="6" style="text-align:center; color:#999;">尚無資料</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增金鑰 Modal -->
    <div class="modal" id="addKeyModal">
        <div class="modal-content">
            <div class="modal-header" id="keyModalTitle">新增 API 金鑰</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>班級名稱</label>
                    <input type="text" id="keyName" placeholder="例：三年甲班" />
                </div>
                <div class="form-group">
                    <label>API 金鑰</label>
                    <input type="text" id="keyValue" placeholder="sk-xxxxx" />
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <label class="switch">
                            <input type="checkbox" id="keyEnabled" checked>
                            <span class="slider"></span>
                        </label>
                        啟用此金鑰
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddKeyModal()">取消</button>
                <button class="btn btn-primary" id="keyModalConfirmBtn" onclick="confirmAddKey()">新增</button>
            </div>
        </div>
    </div>

    <script>
        let selectedTeacher = null;
        let currentTeacherKeys = [];
        let editingOldKey = null;
        let logsOffset = 0;
        let logsHasMore = false;

        // 初始化
        async function init() {
            await loadConfig();
            setDefaultLogDate();
            await loadLogs(true);
        }

        // 載入配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();
                
                const teachersList = document.getElementById('teachersList');
                
                if (Object.keys(data.teachers).length === 0) {
                    teachersList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p>還沒有教師</p>
                        </div>
                    `;
                } else {
                    teachersList.innerHTML = Object.keys(data.teachers).map(teacher => `
                        <div class="teacher-item ${selectedTeacher === teacher ? 'active' : ''}" onclick="selectTeacher('${teacher}')">
                            <div>
                                <div class="teacher-item-name">${teacher}</div>
                                <div class="teacher-item-count">${data.teachers[teacher].api_keys.length} 個金鑰</div>
                            </div>
                            <div class="teacher-actions" onclick="event.stopPropagation();">
                                <button class="btn-sm btn-sm-danger" onclick="deleteTeacher('${teacher}')">刪除</button>
                            </div>
                        </div>
                    `).join('');
                }

                updateLogTeacherOptions(Object.keys(data.teachers));

                if (selectedTeacher) {
                    renderKeysPanel(data.teachers[selectedTeacher]);
                }
            } catch (error) {
                showMessage('載入配置失敗: ' + error.message, 'error');
            }
        }

        // 選擇教師
        async function selectTeacher(teacher) {
            selectedTeacher = teacher;
            await loadConfig();
        }

        // 渲染 Keys 面板
        function renderKeysPanel(teacherConfig) {
            const keysPanel = document.getElementById('keysPanel');
            const header = document.getElementById('selectedTeacherHeader');
            currentTeacherKeys = teacherConfig?.api_keys || [];
            
            header.textContent = `${selectedTeacher} 的 API 金鑰`;

            if (!teacherConfig || currentTeacherKeys.length === 0) {
                keysPanel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔐</div>
                        <p>還沒有 API 金鑰</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddKeyModal()" style="width: 100%;">新增金鑰</button>
                `;
                return;
            }

            const keysHtml = `
                <table class="keys-table">
                    <thead>
                        <tr>
                            <th>班級名稱</th>
                            <th>API 金鑰</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${currentTeacherKeys.map((key, index) => `
                            <tr>
                                <td>${key.name}</td>
                                <td><div class="key-value">${key.key}</div></td>
                                <td>
                                    <label class="switch">
                                        <input type="checkbox" ${key.enabled ? 'checked' : ''} 
                                               onchange="toggleKeyStatus('${key.key}', this.checked)">
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td>
                                    <button class="btn-sm btn-sm-primary" onclick="openEditKeyModal(${index})">編輯</button>
                                    <button class="btn-sm btn-sm-danger" onclick="deleteKey('${key.key}')">刪除</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <button class="btn btn-primary" onclick="openAddKeyModal()" style="width: 100%; margin-top: 20px;">新增金鑰</button>
            `;

            keysPanel.innerHTML = keysHtml;
        }

        // 新增教師
        async function addTeacher() {
            const nameInput = document.getElementById('newTeacherName');
            const name = nameInput.value.trim();

            if (!name) {
                showMessage('請輸入教師名稱', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/teacher/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    nameInput.value = '';
                    selectedTeacher = name;
                    await loadConfig();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('新增失敗: ' + error.message, 'error');
            }
        }

        // 刪除教師
        async function deleteTeacher(teacher) {
            if (!confirm(`確定要刪除教師 "${teacher}" 及其所有金鑰嗎？`)) return;

            try {
                const response = await fetch(`/api/admin/teacher/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teacher })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    if (selectedTeacher === teacher) {
                        selectedTeacher = null;
                    }
                    await loadConfig();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('刪除失敗: ' + error.message, 'error');
            }
        }

        // 打開新增金鑰 Modal
        function openAddKeyModal() {
            if (!selectedTeacher) {
                showMessage('請先選擇教師', 'error');
                return;
            }
            editingOldKey = null;
            document.getElementById('keyModalTitle').textContent = '新增 API 金鑰';
            document.getElementById('keyModalConfirmBtn').textContent = '新增';
            document.getElementById('keyName').value = '';
            document.getElementById('keyValue').value = '';
            document.getElementById('keyEnabled').checked = true;
            document.getElementById('addKeyModal').classList.add('show');
        }

        // 打開編輯金鑰 Modal
        function openEditKeyModal(index) {
            const target = currentTeacherKeys[index];
            if (!target) {
                showMessage('找不到要編輯的金鑰', 'error');
                return;
            }
            editingOldKey = target.key;
            document.getElementById('keyModalTitle').textContent = '編輯 API 金鑰';
            document.getElementById('keyModalConfirmBtn').textContent = '儲存';
            document.getElementById('keyName').value = target.name || '';
            document.getElementById('keyValue').value = target.key || '';
            document.getElementById('keyEnabled').checked = Boolean(target.enabled);
            document.getElementById('addKeyModal').classList.add('show');
        }

        // 關閉新增金鑰 Modal
        function closeAddKeyModal() {
            document.getElementById('addKeyModal').classList.remove('show');
            document.getElementById('keyName').value = '';
            document.getElementById('keyValue').value = '';
            document.getElementById('keyEnabled').checked = true;
            editingOldKey = null;
        }

        // 確認新增金鑰
        async function confirmAddKey() {
            const name = document.getElementById('keyName').value.trim();
            const key = document.getElementById('keyValue').value.trim();
            const enabled = document.getElementById('keyEnabled').checked;

            if (!name || !key) {
                showMessage('請輸入班級名稱和 API 金鑰', 'error');
                return;
            }

            try {
                const isEdit = Boolean(editingOldKey);
                const url = isEdit ? '/api/admin/key/update' : '/api/admin/key/add';
                const body = isEdit
                    ? { teacher: selectedTeacher, old_key: editingOldKey, name, key, enabled }
                    : { teacher: selectedTeacher, name, key, enabled };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    closeAddKeyModal();
                    await loadConfig();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                const action = editingOldKey ? '更新' : '新增';
                showMessage(`${action}失敗: ` + error.message, 'error');
            }
        }

        // 切換金鑰狀態
        async function toggleKeyStatus(key, enabled) {
            try {
                const response = await fetch('/api/admin/key/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teacher: selectedTeacher, key, enabled })
                });

                const data = await response.json();

                if (!data.success) {
                    showMessage(data.message, 'error');
                    await loadConfig();
                }
            } catch (error) {
                showMessage('更新失敗: ' + error.message, 'error');
                await loadConfig();
            }
        }

        // 刪除金鑰
        async function deleteKey(key) {
            if (!confirm('確定要刪除此金鑰嗎？')) return;

            try {
                const response = await fetch('/api/admin/key/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teacher: selectedTeacher, key })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    await loadConfig();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('刪除失敗: ' + error.message, 'error');
            }
        }

        function setDefaultLogDate() {
            const dateInput = document.getElementById('logDate');
            if (!dateInput.value) {
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }
        }

        function updateLogTeacherOptions(teachers) {
            const teacherSelect = document.getElementById('logTeacher');
            const selected = teacherSelect.value;
            const options = ['<option value="">全部教師</option>'];
            teachers.forEach((teacher) => {
                const isSelected = selected === teacher ? 'selected' : '';
                options.push(`<option value="${teacher}" ${isSelected}>${teacher}</option>`);
            });
            teacherSelect.innerHTML = options.join('');
        }

        function buildLogsQuery(limit, offset) {
            const params = new URLSearchParams();
            const dateValue = document.getElementById('logDate').value;
            if (dateValue) {
                params.set('date', dateValue.replaceAll('-', ''));
            }

            const teacher = document.getElementById('logTeacher').value.trim();
            const model = document.getElementById('logModel').value.trim();
            const isValid = document.getElementById('logIsValid').value;
            const keyword = document.getElementById('logKeyword').value.trim();
            if (teacher) params.set('teacher', teacher);
            if (model) params.set('model', model);
            if (isValid) params.set('is_valid', isValid);
            if (keyword) params.set('keyword', keyword);
            params.set('limit', String(limit));
            params.set('offset', String(offset));
            return params.toString();
        }

        async function loadLogs(reset = true) {
            const limitInput = Number(document.getElementById('logLimit').value || 50);
            const limit = Math.min(Math.max(limitInput, 1), 200);
            const offset = reset ? 0 : logsOffset;
            const query = buildLogsQuery(limit, offset);

            try {
                const response = await fetch(`/api/admin/logs?${query}`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data?.detail?.message || '載入 logs 失敗');
                }

                renderLogs(data.items || [], !reset);
                logsOffset = offset + (data.items || []).length;
                logsHasMore = Boolean(data.has_more);
                document.getElementById('loadMoreLogsBtn').style.display = logsHasMore ? 'inline-block' : 'none';
            } catch (error) {
                showMessage('載入 logs 失敗: ' + error.message, 'error');
            }
        }

        function renderLogs(items, append = false) {
            const tbody = document.getElementById('logsTableBody');
            const rows = (items || []).map((item) => `
                <tr>
                    <td>${item.timestamp || '-'}</td>
                    <td>${item.teacher || '-'}</td>
                    <td>${item.model || '-'}</td>
                    <td>${item.validation_result || '-'}</td>
                    <td><div class="key-value">${item.api_key || '-'}</div></td>
                    <td><div class="logs-message-preview">${item.message_preview || ''}</div></td>
                </tr>
            `).join('');

            if (!rows && !append) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">尚無資料</td></tr>';
                return;
            }

            if (append) {
                tbody.insertAdjacentHTML('beforeend', rows);
            } else {
                tbody.innerHTML = rows;
            }
        }

        async function applyLogFilters() {
            logsOffset = 0;
            await loadLogs(true);
        }

        async function refreshLogs() {
            await loadLogs(true);
        }

        async function loadMoreLogs() {
            if (!logsHasMore) return;
            await loadLogs(false);
        }

        // 顯示訊息
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = `message ${type} show`;
            div.textContent = message;
            container.innerHTML = '';
            container.appendChild(div);

            setTimeout(() => div.classList.remove('show'), 3000);
        }

        // 初始化
        init();
    </script>
</body>
</html>
